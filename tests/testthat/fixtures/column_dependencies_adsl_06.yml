table_metadata:
  table: adsl
  keys:
    - USUBJID

init:
  core_domains:
    - DM
    - DM_VACCINE
  filter_domain:
    - DM: '!is.na(AGEU)'
    - DM_VACCINE: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
  filter_depend_cols:
    - core.STUDYID
    - core.DOMAIN
    - core.AGEU

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: PLANNED_ARM
    source: core.ARM

  - column: PLANNED_ARM2
    source: PLANNED_ARM

  - column: VAR1
    source: EX.VAR1
