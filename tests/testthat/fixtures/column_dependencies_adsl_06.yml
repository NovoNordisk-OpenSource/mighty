table_metadata:
  table: adsl

init:
  core_domains:
    - dm
    - dm_vaccine
  filter_domain:
    - dm: '!is.na(AGEU)'
    - dm_vaccine: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
  filter_depend_cols:
    - core.STUDYID
    - core.DOMAIN
    - core.AGEU

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: PLANNED_ARM
    source: core.ARM

  - column: PLANNED_ARM2
    source: PLANNED_ARM

  - column: VAR1
    source: ex.VAR1
