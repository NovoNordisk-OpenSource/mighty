table_metadata:
  table: ADLB
  label: Lab Analysis
  class: BASIC DATA STRUCTURE
  structure: One record per subject per parameter per analysis visit
  keys:
    - USUBJID PARAMN AVISITN ADT ATM SRCSEQ
  comment: 'MODIFY, OPTIONAL to fill: To add a link to a reference, e.g. ADRG, SAP
    or a program file update source_documents tab in adam_cst_metdata_xxxx.xls template.
    Syntax is explained in column header notes of the template.'

init:
  core_domains:
    - LB
    - XL
  filter_domain:
    LB: NA
    XL: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
  filter_depend_cols:
    - core.STUDYID
    - core.DOMAIN

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: TRT01P
    source: ADSL.TRT01P

  - column: AVAL
    source: core.LBSTRESN

  - column: AVALC
    source: core.LBSTRESNC

  - column: STUDYID
    label: "some text"
    source: core.STUDYID

  - column: LBSEQ
    source: core.LBSEQ

  - column: LBSTRESN
    source: core.LBSTRESN


  - column: LBSTRESNC
    source: core.LBSTRESNC

  - column: DOMAIN
    source: core.DOMAIN

  - column: LBTEST
    label: some text
    code_id: aval_grp_01
    method: |-
      Some text
    depend_rows:
      - new_aval_01

  - column: AVAL_GRP2
    label: some text
    code_id: aval_grp_02

row_actions:

  - row: add_lbtest_01
    code_id: new_lbtest_01

  - row: new_lbtest_02
    code_id: new_lbtest_02

  - row: new_lbtest_03
    code_id: new_lbtest_03

  - row: new_lbtest_04
    code_id: new_lbtest_04

  - row: new_lbtest_05
    code_id: new_lbtest_05

  - row: new_lbtest_06
    code_id: new_lbtest_06

  - row: add_aval_01
    code_id: new_aval_01

  - row: add_aval_02
    code_id: new_aval_02

  - row: add_aval_03
    code_id: new_aval_03

  - row: add_aval_04
    code_id: new_aval_04

  - row: add_visitnum_01
    code_id: new_visitnum_01

  - row: add_visitnum_02
    code_id: new_visitnum_01


  - row: add_aval_grp_1
    code_id: aval_grp_01

  - row: add_aval_grp_2
    code_id: aval_grp_02

