id: ADLB
label: Laboratory Analysis Dataset
class: BASIC DATA STRUCTURE
structure: One record per subject per parameter per analysis visit
keys:
  - STUDYID


population:
  base:
    - domain: lb
      depends:
        - LBSTRESN
      filter: '!is.na(LBSTRESN)'
  global:
    - filter: '!is.na(SEX)'
      depends:
        - ADSL.SEX
    - filter: 'LBSTRESU == "fL"'
      depends:
        - LBSTRESU

columns:
  - id: STUDYID

  - id: VISITNUM

  - id: LBSTRESN

  - id: LBSTRESU

  - id: AGE
    method: ADSL.AGE
