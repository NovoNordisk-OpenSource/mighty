id: ADLB
keys:
  - USUBJID
  - STUDYID
  - LBSEQ

population:
  base:
    - domain: lb
      depends:
        - LBSTRESN
      filter: '!is.na(LBSTRESN)'
  global:
    - filter: '!is.na(SEX)'
      depends:
        - ADSL.SEX
    - filter: 'LBSTRESU == "fL"'
      depends:
        - LBSTRESU

columns:
  - id: STUDYID

  - id: VISITNUM

  - id: LBSTRESN

  - id: LBSTRESU

  - id: AGE
    method: ADSL.AGE
