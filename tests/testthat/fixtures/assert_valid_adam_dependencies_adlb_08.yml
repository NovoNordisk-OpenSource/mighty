table:
  name: ADLB

init:
  base_domains:
    - lb
  filter_domain:
    - lb: '!is.na(LBSTRESN)'
  filter_global:
    - '!is.na(SEX)'
    - 'LBSTRESU == "fL"'
  filter_depend_cols:
    - LBSTRESN
    - ADSL.SEX
    - LBSTRESU

column_action:
 # - column: USUBJID

  STUDYID:

  VISITNUM:

  LBSTRESN:

  LBSTRESU:

  AGE:
    source: ADSL.AGE


