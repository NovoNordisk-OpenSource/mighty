id: ADSL
label: Subject Level Analysis Dataset
class: SUBJECT LEVEL ANALYSIS DATASET
structure: One record per subject
keys:
  - USUBJID
  - STUDYID

population:
  base:
    - domain: DM
      depends:
        - AGEU
      filter: '!is.na(AGEU)'
    - domain: DM_VACCINE
      depends:
        - NA
      filter: NA
  global:
    - filter: 'STUDYID == "CDISCPILOT01"'
      depends:
        - STUDYID
    - filter: 'DOMAIN == "DM"'
      depends:
        - DOMAIN

columns:
  - id: USUBJID

  - id: DOMAIN

  - id: AGEU
    method: AGEU

  - id: PLANNED_ARM
    method: ARM

  - id: SEX

  - id: ARM_GRP1
    component:
      id: "{path_base}/fixtures/components/arm_group_01.R"

  - id: ARM_CAT1
    component:
      id: "{path_base}/fixtures/components/arm_category_01.R"

  - id: ARM_MATCH
    component:
      id: "{path_base}/fixtures/components/arm_match_01.R"

  - id: AGE2
    component:
      id: "{path_base}/fixtures/components/age_crop_01.R"

  - id: AGE_DIFF1
    component:
      id: "{path_base}/fixtures/components/age_diff_01.R"

  - id: AGE_DIFF2
    component:
      id: "{path_base}/fixtures/components/age_diff_02.R"

  - id: RACE_COUNTRY
    component:
      id: "{path_base}/fixtures/components/race_x_country_01.R"

  - id: NEW_ARM
    component:
      id: "{path_base}/fixtures/components/arm_01.R"

  - id: MIN_AVAL
    component:
      id: "{path_base}/fixtures/components/min_aval_01.R"

  - id: ARM

  - id: DTHFL

  - id: AGE

  - id: NEWFL01
    component:
      id: "{path_base}/fixtures/components/newfl_01.R"

  - id: NEWREA01
    component:
      id: "{path_base}/fixtures/components/newfl_01.R"

  - id: NEWFL02
    component:
      id: "{path_base}/fixtures/components/newfl_02.R"

  - id: NEWFL03
    component:
      id: "{path_base}/fixtures/components/newfl_03.R"

  - id: NEWREA03
    component:
      id: "{path_base}/fixtures/components/newfl_03.R"

  - id: STUDYID

  - id: ACTARM

  - id: COUNTRY

  - id: RACE

  - id: AGE_GRP1
    component:
      id: "{path_base}/fixtures/components/age_group_01.R"
