id: ADSL
keys:
  - USUBJID
  - STUDYID

population:
  base:
    - domain: dm
      depends:
        - AGEU
      filter: '!is.na(AGEU)'
    - domain: dm_vaccine
      depends:
        - NA
      filter: NA
  global:
    - filter: 'STUDYID == "CDISCPILOT01"'
      depends:
        - STUDYID
    - filter: 'DOMAIN == "DM"'
      depends:
        - DOMAIN

columns:
  - id: USUBJID

  - id: ARM_GRP1
    label: "some text"
    component:
      id: arm_group_01

  - id: AGE_GRP1
    label: "some text"
    component:
      id: age_group_01
      with:
        cut_points: c(20, 45)
