table:
  name: ADSL

init:
  core_domains:
    - dm
  filter_domain:
    - dm: '!is.na(AGEU)'
    - dm_vaccine: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
  filter_depend_cols:
    - core.STUDYID
    - core.DOMAIN
    - core.AGEU

column_action:
  USUBJID:
    source: core.USUBJID

  ARM_GRP1:
    label: "some text"
    code_id: arm_group_01

  AGE_GRP1:
    label: "some text"
    code_id: age_group_01
    parameters:
      - cut_points: c(20, 45)
