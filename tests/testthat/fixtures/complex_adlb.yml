table_metadata:
  table: ADLB
  keys:
    - USUBJID PARAMN AVISITN ADT ATM SRCSEQ


init:
  core_domains:
    - LB
  filter_domain:
    LB: NA
  filter_global:
    - '!is.na(SEX)'
  filter_depend_cols:
    - ADSL.SEX

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: VISITNUM
    source: core.VISITNUM

  - column: ARM
    source: ADSL.PLANNED_ARM

  - column: RACE_COUNTRY
    source: ADSL.RACE_COUNTRY

  - column: AVAL
    source: core.LBSTRESN

  - column: AVALC
    source: core.LBSTRESC

  - column: STUDYID
    label: "some text"
    source: core.STUDYID

  - column: LBSEQ
    source: core.LBSEQ

  - column: LBSTRESN
    source: core.LBSTRESN

  - column: LBSTRESC
    source: core.LBSTRESC

  - column: DOMAIN
    source: core.DOMAIN

  - column: LBTEST
    label: some text
    code_id: lbtest_01
    method: |-
      Some text
    depend_rows:
      - new_aval_01

  - column: AVAL_GRP
    label: some text
    code_id: aval_grp_01
    depend_rows:
      - new_lbtest_01

  - column: AVAL_GRP2
    label: some text
    code_id: aval_grp_02
    depend_rows:
      - new_lbtest_01

row_actions:
  - code_id: new_lbtest_01

  - code_id: new_lbtest_02

  - code_id: new_lbtest_03
    depend_rows:
        - new_lbtest_01

  - code_id: new_lbtest_04
    depend_rows:
      - new_lbtest_02

  - code_id: new_lbtest_05
    depend_rows:
      - new_lbtest_01
      - new_lbtest_02

  - code_id: new_lbtest_06
    depend_rows:
      - new_lbtest_03

  - code_id: new_aval_01

  - code_id: new_aval_02
    depend_rows:
      - new_aval_01

  - code_id: new_aval_03

  - code_id: new_aval_04

  - code_id: new_visitnum_01

  - code_id: new_visitnum_02
    depend_rows:
      - new_visitnum_01

  - code_id: new_lbtest_07

  - code_id: new_lbtest_07
    parameters:
      - test_val: "s:Protein"

  - code_id: new_lbtest_07
    parameters:
      - test_val: "s:Specific Gravity"
