table_metadata:
  table: ADLB
  keys:
    - SUBJID AEREFID

init:
  core_domains:
    - lb
  filter_domain:
    lb: '!is.na(LBSTRESN)'
  filter_global:
    - '!is.na(SEX)'
    - 'AETRTEM == "Y"'
  filter_depend_cols:
    - core.LBSTRESN
    - ADSL.SEX
    - AETRTEM

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: VISITNUM
    source: core.VISITNUM

