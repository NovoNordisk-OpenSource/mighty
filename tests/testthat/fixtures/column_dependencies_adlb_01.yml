table_metadata:
  table: ADLB
  keys:
    - USUBJID PARAMN AVISITN ADT ATM SRCSEQ

init:
  core_domains:
    - lb
  filter_domain:
    lb: '!is.na(LBSTRESN)'
  filter_global:
    - '!is.na(SEX)'
  filter_depend_cols:
    - core.LBSTRESN
    - ADSL.SEX

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: VISITNUM
    source: core.VISITNUM

