table_metadata:
  table: ADAE
  keys:
    - USUBJID PARAMN AVISITN ADT ATM SRCSEQ

init:
  core_domains:
    - AE
  filter_domain:
    AE: '!is.na(AEBODSYS)'
  filter_global:
    - '!is.na(SEX)'
    - 'AETRTEM == "Y"'
  filter_depend_cols:
    - core.AEBODSYS
    - ADSL.SEX
    - AETRTEM

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: AESOC
    source: core.AESOC

  - column: AETRTEM
    code_id: supp_ae_01


