table_metadata:
  table: ADAE
  
init:
  base_domains:
    - ae
  filter_domain:
    ae: '!is.na(AEBODSYS)'
  filter_global:
    - '!is.na(SEX)'
    - 'AETRTEM == "Y"'
  filter_depend_cols:
    - AEBODSYS
    - ADSL.SEX
    - AETRTEM

column_metadata:

  - column: STUDYID

  - column: USUBJID

  - column: AESOC

  - column: AEBODSYS

  - column: AGE
    source: ADSL.AGE

  - column: AETRTEM
    code_id: {path_base}/fixtures/components/supp_ae_01.R


