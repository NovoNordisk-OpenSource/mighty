id: ADAE
label: Adverse Events Analysis Dataset
class: OCCURRENCE DATA STRUCTURE
structure: One record per subject per adverse event
keys:
  - USUBJID
  - AESEQ

population:
  base:
    - domain: ae
      depends:
        - AEBODSYS
      filter: '!is.na(AEBODSYS)'
  global:
    - filter: '!is.na(SEX)'
      depends:
        - adsl.SEX
    - filter: 'AETRTEM == "Y"'
      depends:
        - AETRTEM

columns:
  - id: STUDYID

  - id: USUBJID

  - id: AESEQ

  - id: AESOC

  - id: AEBODSYS

  - id: AGE
    method: adsl.AGE

  - id: AETRTEM
    component:
      id: "{path_base}/fixtures/components/supp_ae_01.R"
