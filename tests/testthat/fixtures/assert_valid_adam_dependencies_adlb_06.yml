id: ADLB
keys:
  - USUBJID
  - STUDYID

population:
  base:
    - domain: LB
      depends:
        - LBSTRESN
      filter: '!is.na(LBSTRESN)'
  global:
    - filter: '!is.na(SEX)'
      depends:
        - ADSL.SEX

columns:
  - id: USUBJID

  - id: STUDYID

  - id: LBSTRESN

  - id: VISITNUM

  - id: VISITNUM2
    method: VISITNUM

  - id: AGE
    method: ADSL.AGE
