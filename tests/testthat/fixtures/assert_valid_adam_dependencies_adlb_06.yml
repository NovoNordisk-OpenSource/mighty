table_metadata:
  table: ADLB

init:
  core_domains:
    - LB
  filter_domain:
    LB: '!is.na(LBSTRESN)'
  filter_global:
    - '!is.na(SEX)'
  filter_depend_cols:
    - core.LBSTRESN
    - ADSL.SEX

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: STUDYID
    source: core.STUDYID

  - column: VISITNUM
    source: core.VISITNUM

  - column: VISITNUM2
    source: VISITNUM

  - column: AGE
    source: ADSL.AGE

