id: ADLB
keys:
  - USUBJID
  - STUDYID
  - LBSEQ

population:
  base:
    - domain: lb
      depends:
        - NA
      filter: NA
  global:
    - filter: 'LBTEST %in% c("Protein", "Specific Gravity")'
      depends:
        - LBTEST

columns:
  - id: USUBJID

  - id: STUDYID

  - id: LBSEQ

  - id: LBTEST

  - id: LBSTRESN

  - id: LBSTNRLO

  - id: LBSTNRHI

  - id: PARAM_VAR1
    component:
      id: "{path_base}/fixtures/components/param_var1_val.mustache"
      with:
        value: "ABC"

  - id: VAR2
    component:
      id: "{path_base}/fixtures/components/param_1_new_1_val.mustache"
      with:
        new_variable: VAR2
        value: 99

  - id: LBSTRESN_COPY
    component:
      id: "{path_base}/fixtures/components/param_1_new_1_var.mustache"
      with:
        old_variable: LBSTRESN
        new_variable: LBSTRESN_COPY

  - id: LBSTNRLO_COPY
    component:
      id: "{path_base}/fixtures/components/param_1_new_1_var.mustache"
      with:
        old_variable: LBSTNRLO
        new_variable: LBSTNRLO_COPY

  - id: PARAM_VAR2
    component:
      id: "{path_base}/fixtures/components/param_var2_2_var.mustache"
      with:
        in_variable1: LBSTNRLO
        in_variable2: LBSTNRHI

  - id: VAR3
    component:
      id: "{path_base}/fixtures/components/param_1_new_2_var.mustache"
      with:
        in_variable1: LBSTNRLO
        in_variable2: LBSTNRHI
        new_variable: VAR3

  - id: VAR4
    component:
      id: "{path_base}/fixtures/components/param_2_new_2_val.mustache"
      with:
        new_variable1: VAR4
        new_variable2: VAR5

  - id: VAR5
    component:
      id: "{path_base}/fixtures/components/param_2_new_2_val.mustache"
      with:
        new_variable1: VAR4
        new_variable2: VAR5

  - id: VAR6
    component:
      id: "{path_base}/fixtures/components/param_2_new_2_var.mustache"
      with:
        in_variable1: LBSTNRLO
        in_variable2: LBSTNRHI
        new_variable1: VAR6
        new_variable2: VAR7

  - id: VAR7
    component:
      id: "{path_base}/fixtures/components/param_2_new_2_var.mustache"
      with:
        in_variable1: LBSTNRLO
        in_variable2: LBSTNRHI
        new_variable1: VAR6
        new_variable2: VAR7

  - id: LBSTRESN_CROP
    component:
      id: "{path_base}/fixtures/components/param_lbstresn_crop.mustache"
      with:
        LBSTRESN_MINVAL: 38.0
    depends:
      - rows.new_protein
      - rows.new_specific_gravity

  - id: AVAL
    method: LBSTRESN
    depends:
      - rows.new_protein

  - id: AVAL_GRP
    component:
      id: "{path_base}/fixtures/components/aval_grp_01.R"

rows:
  - id: new_protein
    component:
      id: "{path_base}/fixtures/components/new_lbtest07.mustache"
      with:
        variable: Protein

  - id: new_specific_gravity
    component:
      id: "{path_base}/fixtures/components/new_lbtest07.mustache"
      with:
        variable: Specific Gravity
