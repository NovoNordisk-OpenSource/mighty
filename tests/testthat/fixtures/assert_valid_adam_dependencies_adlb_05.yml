table_metadata:
  table: ADLB

init:
  base_domains:
    - LB
  filter_domain:
    LB: '!is.na(LBSTRESN)'
  filter_global:
    - '!is.na(SEX)'
  filter_depend_cols:
    - LBSTRESN
    - ADSL.SEX

column_metadata:
  - column: USUBJID

  - column: STUDYID

  - column: LBSTRESN

  - column: VISITNUM

  - column: VISITNUM2
    source: VISITNUM

