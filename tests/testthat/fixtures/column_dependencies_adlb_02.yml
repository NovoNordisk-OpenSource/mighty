id: adlb
keys:
  - USUBJID
  - STUDYID
  - LBSEQ

population:
  base:
    - domain: lb
      depends:
        - LBSTRESN
      filter: '!is.na(LBSTRESN)'
  global:
    - filter: '!is.na(SEX)'
      depends:
        - adsl.SEX
    - filter: 'LBSTRESU == "fL"'
      depends:
        - LBSTRESU

columns:
  - id: USUBJID

  - id: STUDYID

  - id: LBSEQ

  - id: VISITNUM

  - id: LBSTRESN

  - id: LBSTRESU
