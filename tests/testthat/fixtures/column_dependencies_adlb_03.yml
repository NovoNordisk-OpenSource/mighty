table_metadata:
  table: adlb

init:
  base_domains:
    - lb
  filter_domain:
    - lb: '!is.na(LBSTRESN)'
  filter_global:
    - '!is.na(SEX)'
    - 'LBSTRESU == "fL"'
  filter_depend_cols:
    - LBSTRESN
    - adsl.SEX
    - LBSTRESU

column_metadata:
  - column: USUBJID

  - column: STUDYID

  - column: LBSEQ

  - column: VISITNUM

  - column: LBSTRESN

  - column: LBSTRESU

  - column: AGE
    source: adsl.AGE


