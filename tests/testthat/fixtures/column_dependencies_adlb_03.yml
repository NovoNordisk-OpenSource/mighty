id: ADLB
label: Laboratory Analysis Dataset
class: BASIC DATA STRUCTURE
structure: One record per subject per parameter per analysis visit
keys:
  - USUBJID
  - STUDYID
  - LBSEQ

population:
  base:
    - domain: LB
      depends:
        - LBSTRESN
      filter: '!is.na(LBSTRESN)'
  global:
    - filter: '!is.na(SEX)' 
      depends:
        - ADSL.SEX
    - filter: 'LBSTRESU == "fL"'
      depends:
        - LBSTRESU


columns:
  - id: USUBJID

  - id: STUDYID

  - id: LBSEQ

  - id: VISITNUM

  - id: LBSTRESN

  - id: LBSTRESU

  - id: AGE
    method: ADSL.AGE
