table_metadata:
  table: ADSL
  
init:
  base_domains:
    - dm
    - dm_vaccine
  filter_domain:
    - dm: '!is.na(AGEU)'
    - dm_vaccine: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
    - 'EFFICACY == "Y"'
  filter_depend_cols:
    - AGEU
    - STUDYID
    - DOMAIN
    - EFFICACY

column_metadata:
  - column: STUDYID

  - column: USUBJID

  - column: AGEU

  - column: DOMAIN

  - column: ARM

  - column: PLANNED_ARM
    source: ARM

  - column: ARM_GRP1
    code_id: {path_base}/fixtures/components/arm_group_01.R

  - column: EFFICACY
    code_id: {path_base}/fixtures/components/supp_dm_01.R

  - column: SAFETY
    code_id: {path_base}/fixtures/components/supp_dm_01.R
