id: ADAE
label: Adverse Events Analysis Dataset
class: OCCURRENCE DATA STRUCTURE
structure: One record per subject per adverse event
keys:
  - USUBJID

population:
  base:
    - domain: AE
      depends:
        - AEBODSYS_GRP
      filter: 'AEBODSYS_GRP == "MILD DISORDER"'
  global:
    - filter: NA
      depends:
        - NA

columns:
  - id: STUDYID

  - id: USUBJID

  - id: AESEV

  - id: AEBODSYS

  - id: AGE
    method: ADSL.AGE

  - id: AESEV_GRP
    component:
      id: "{path_base}/fixtures/components/aesev_grp_01.R"

  - id: AEBODSYS_GRP
    component:
      id: "{path_base}/fixtures/components/aebodsys_grp_01.R"
