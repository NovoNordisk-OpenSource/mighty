id: ADAE
keys:
  - USUBJID

population:
  base:
    - domain: ae
      depends:
        - AEBODSYS_GRP
      filter: 'AEBODSYS_GRP == "MILD DISORDER"'
  global:
    - filter: NA
      depends:
        - NA

columns:
  - id: STUDYID

  - id: USUBJID

  - id: AESEV

  - id: AEBODSYS

  - id: AGE
    method: adsl.AGE

  - id: AESEV_GRP
    component:
      id: "{path_base}/fixtures/components/aesev_grp_01.R"

  - id: AEBODSYS_GRP
    component:
      id: "{path_base}/fixtures/components/aebodsys_grp_01.R"
