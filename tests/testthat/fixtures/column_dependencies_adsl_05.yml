id: ADSL
label: Subject Level Analysis Dataset
class: SUBJECT LEVEL ANALYSIS DATASET
structure: One record per subject
keys:
  - USUBJID
  - STUDYID

population:
  base:
    - domain: DM
      depends:
        - AGEU
      filter: '!is.na(AGEU)'
    - domain: DM_VACCINE
      depends:
        - NA
      filter: NA
  global:
    - filter: 'STUDYID == "CDISCPILOT01"'
      depends:
        - STUDYID
    - filter: 'DOMAIN == "DM"'
      depends:
        - DOMAIN

columns:
  - id: USUBJID

  - id: DOMAIN

  - id: STUDYID

  - id: ARM

  - id: AGEU

  - id: PLANNED_ARM
    method: ARM

  - id: ARM_GRP1
    component:
      id: "{path_base}/fixtures/components/arm_group_01.R"
