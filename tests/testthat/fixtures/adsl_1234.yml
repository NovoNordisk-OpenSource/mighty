table_metadata:
  table: ADSL
  label: Subject-Level Analysis Dataset
  class: SUBJECT LEVEL ANALYSIS DATASET
  structure: One record per subject
  keys:
    - USUBJID
  comment: 'MODIFY, OPTIONAL to fill: To add a link to a reference, e.g. ADRG, SAP
    or a program file update source_documents tab in adam_cst_metdata_xxxx.xls template.
    Syntax is explained in column header notes of the template.'

init:
  core_domains:
    - DM
    - DM_VACCINE
  filter_domain:
    dm: '!is.na(AGEU)'
    dm_vaccine: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
  filter_depend_cols:
    - core.STUDYID
    - core.DOMAIN
    - core.AGEU

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: PLANNED_ARM
    source: core.ARM

  - column: SEX
    source: core.SEX

  - column: ARM_GRP1
    label: "some text"
    code_id: arm_group_01

  - column: ARM_CAT1
    label: "some text"
    code_id: arm_category_01

  - column: ARM_MATCH
