table_metadata:
  table: ADLB
  label: Lab Analysis
  class: BASIC DATA STRUCTURE
  structure: One record per subject per parameter per analysis visit
  keys:
    - USUBJID PARAMN AVISITN ADT ATM SRCSEQ
  comment: 'MODIFY, OPTIONAL to fill: To add a link to a reference, e.g. ADRG, SAP
    or a program file update source_documents tab in adam_cst_metdata_xxxx.xls template.
    Syntax is explained in column header notes of the template.'

init:
  core_domains:
    - LB
    - XL
  filter_domain:
    LB: NA
    XL: NA
  filter_global:
    - 'STUDYID == "CDISCPILOT01"'
    - 'DOMAIN == "DM"'
  filter_depend_cols:
    - core.STUDYID
    - core.DOMAIN

column_metadata:
  - column: USUBJID
    source: core.USUBJID

  - column: TRT01P
    source: ADSL.TRT01P

  - column: AVAL
    source: core.LBSTRESN

  - column: LBSEQ
    source: core.LBSEQ



  - column: LBTEST
    label: some text
    code_id: lbtest_01
    method: |-
      Some text
    depend_rows:
      - new_aval_01

row_actions:
  - row: add_lbtest_01
    code_id: new_lbtest_01

  - row: add_aval
    code_id: new_aval_01


referenced_domains:
  - domain: LB
    variables:
      - USUBJID
      - LBORRES
      - LBORRESU
      - LBFAST
      - LBDTC
      - VISITNUM
      - ANRLO
      - ANRHI
      - SRCSEQ
      - AVALC
