      - ADT
      - ATM
      - ADTM
  - domain: ADSL
    variables:
      - TRTP
      - TRTPN
      - TRTA
      - TRTAN
      - STUDYID
      - SUBJID
      - FASFL
      - SAFFL
      - RANDFL
